name: Build APK NotifikasiSuara

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK sebagai Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NotifikasiSuara-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0-${{ github.run_number }}
        name: NotifikasiSuara v1.0 (Build ${{ github.run_number }})
        body: |
          APK Pembaca Notifikasi dengan TTS Natural
          - Mendukung GoPay Merchant
          - TTS Bahasa Indonesia natural
          - Konversi Rp ke kata-kata (Rp 50.000 = lima puluh ribu rupiah)
        files: app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
